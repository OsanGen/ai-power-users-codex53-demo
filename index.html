<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Nets: Learn the Loop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260228-1" />
  </head>
  <body>
    <a class="skip-link" href="#gameFrame">Skip to game area</a>
    <main id="appShell" class="app-shell" aria-label="Neural net learning game container">
      <header class="app-header">
        <div class="header-top-row">
          <div class="header-title-inline header-title-inline--controls">
            <h1 id="appTitle">Neural Nets: Learn the Loop</h1>
            <div id="appPrimaryControlHints" class="primary-control-hints" aria-label="Primary movement and shooting controls">
              <span class="control-pill control-pill--move control-pill--static">
                <span class="control-pill-dot control-pill-dot--move" aria-hidden="true"></span>
                <span id="appMoveHintText">WASD: MOVE</span>
              </span>
              <span class="control-pill control-pill--shoot control-pill--static">
                <span class="control-pill-dot control-pill-dot--shoot" aria-hidden="true"></span>
                <span id="appShootHintText">ARROWS: SHOOT</span>
              </span>
            </div>
          </div>
          <div id="appFooterControlStrip" class="control-strip" aria-label="Controls shortcuts">
            <button
              type="button"
              class="control-pill control-pill-button control-pill--bomb"
              id="appFooterBombHintBtn"
              aria-label="Use the bomb with Spacebar"
            >
              <span class="control-pill-dot control-pill-dot--bomb" aria-hidden="true"></span>
              <span class="control-pill-key" id="appFooterBombHintKey">Spacebar</span>
              <span id="appFooterBombHintAction">Use bomb</span>
              <span id="appFooterBombHintState" class="control-pill-state" aria-hidden="true">Action</span>
            </button>
            <button
              type="button"
              class="control-pill control-pill-button control-pill--music"
              id="appFooterMusicHintBtn"
              aria-label="Mute or unmute music with M"
            >
              <span class="control-pill-dot control-pill-dot--music" aria-hidden="true"></span>
              <span class="control-pill-key" id="appFooterMusicHintKey">M</span>
              <span id="appFooterMusicHintAction">Mute music</span>
              <span id="appFooterMusicHintState" class="control-pill-state" aria-hidden="true">On</span>
            </button>
            <button
              type="button"
              class="control-pill control-pill-button control-pill--sfx"
              id="appFooterSfxHintBtn"
              aria-label="Mute or unmute sound effects with E"
            >
              <span class="control-pill-dot control-pill-dot--sfx" aria-hidden="true"></span>
              <span class="control-pill-key" id="appFooterSfxHintKey">E</span>
              <span id="appFooterSfxHintAction">Mute sound effects</span>
              <span id="appFooterSfxHintState" class="control-pill-state" aria-hidden="true">On</span>
            </button>
          </div>
        </div>
      </header>

      <section id="gameFrame" class="game-frame" tabindex="-1">
        <canvas id="game" width="1280" height="720" aria-label="Neural net game canvas"></canvas>
        <button id="overlayRestartBtn" type="button" class="overlay-restart hidden">Restart lesson</button>
        <div
          id="textModal"
          class="modal hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="textModalTitle"
          aria-hidden="true"
        >
          <div class="modal-panel">
            <div class="modal-accent" aria-hidden="true"></div>
            <h2 id="textModalTitle">Lesson source text</h2>
            <p id="textModalNote" class="modal-note">Edit the source text used in lesson cards.</p>
            <label id="lessonTextLabel" class="sr-only" for="lessonTextInput">Lesson source text</label>
            <textarea id="lessonTextInput" class="share-text" aria-label="Lesson source text"></textarea>
            <div class="modal-actions">
              <button id="lessonTextSaveBtn" type="button" class="btn btn-primary">Save text</button>
              <button id="lessonTextSampleBtn" type="button" class="btn">Use sample</button>
              <button id="lessonTextCloseBtn" type="button" class="btn">Close</button>
            </div>
          </div>
        </div>
        <div id="shareModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="shareTitle" aria-hidden="true">
          <div class="modal-panel">
            <div class="modal-accent" aria-hidden="true"></div>
            <h2 id="shareTitle">Share what you learned</h2>
            <p class="modal-summary">Post your floor and the neural net loop. (<span id="shareFloor">Floor 1</span>)</p>
            <div class="share-card-wrap">
              <img id="shareCardPreview" class="share-card-preview" alt="Neural net run card preview" />
            </div>
            <label id="shareTextLabel" class="sr-only" for="shareText">Suggested post copy</label>
            <textarea id="shareText" class="share-text" readonly></textarea>
            <div class="modal-actions">
              <button id="shareCopyBtn" type="button" class="btn btn-primary">Copy text</button>
              <button id="shareLinkedInBtn" type="button" class="btn">Open LinkedIn</button>
              <button id="shareDownloadBtn" type="button" class="btn">Download card</button>
              <button id="shareCloseBtn" type="button" class="btn">Not now</button>
            </div>
            <label class="modal-check">
              <input id="shareDontAsk" type="checkbox" />
              <span id="shareDontAskText">Don&apos;t ask again</span>
            </label>
            <p id="shareModalNote" class="modal-note">You can re-enable in settings.</p>
          </div>
        </div>
      </section>

      <footer class="app-footer">
      </footer>
    </main>

    <script src="./narrative.js?v=20260228-1"></script>
    <script src="./src/ui-tokens.js?v=20260223-2"></script>
    <script src="./src/core.js?v=20260223-2"></script>
    <script src="./src/content.js?v=20260222-7"></script>
    <script src="./src/upgrades.js?v=20260221-22"></script>
    <script src="./src/share.js?v=20260221-22"></script>
    <script src="./src/audio.js?v=20260224-2"></script>
    <script src="./src/systems.js?v=20260228-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/elkjs@0.10.0/lib/elk.bundled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixi/particle-emitter@5.0.8/dist/particle-emitter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/glfx@0.0.4/glfx.js"></script>
    <script src="./src/lesson-diagram-v2.js?v=20260303-1"></script>
    <script src="./src/render.js?v=20260303-2"></script>
    <script src="./src/main.js?v=20260223-1"></script>
  </body>
</html>
